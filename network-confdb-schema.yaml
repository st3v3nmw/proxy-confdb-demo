type: confdb-schema
# Replace <your-account-id> with your Store account ID (from `snapcraft whoami`)
authority-id: <your-account-id>
account-id: <your-account-id>
name: network
revision: "4"  # Bump the revision number after updating the assertion
# Update the timestamp when modifying the assertion (run: date -Iseconds --utc)
timestamp: <timestamp>
views:
  proxy-admin:
    rules:
      - request: "{protocol}"
        storage: "v1.proxy.{protocol}"
        access: read-write
        content:
          - request: url
            storage: url
          - request: bypass
            storage: bypass
  proxy-state:
    rules:
      - request: https
        storage: v1.proxy.https
        access: read
      - request: ftp
        storage: v1.proxy.ftp
        access: read
# The body is the storage schema as a JSON string
body: |-
  {
    "storage": {
      "aliases": {
        "protocol": {
          "choices": [
            "http",
            "https",
            "ftp"
          ],
          "type": "string"
        }
      },
      "schema": {
        "v1": {
          "schema": {
            "proxy": {
              "keys": "${protocol}",
              "values": {
                "schema": {
                  "bypass": {
                    "type": "array",
                    "unique": true,
                    "values": "string"
                  },
                  "url": "string"
                }
              }
            }
          }
        }
      }
    }
  }
